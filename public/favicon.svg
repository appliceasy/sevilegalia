<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Sevilegalia</title>
  <desc id="desc">Balanza de la justicia con la Giralda de Sevilla como eje central</desc>
  <defs>
    <linearGradient id="sevi-bg" x1="6" y1="4" x2="58" y2="60">
      <stop stop-color="#0a2e24"/>
      <stop offset="0.5" stop-color="#07404E"/>
      <stop offset="1" stop-color="#145c46"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#sevi-bg)"/>

  <!-- Silueta unificada: aguja + torre escalonada (inspirada en la Giralda) -->
  <path
    fill="#c5e3d7"
    d="M32 4.5 L35.5 18 L36 24.5 L37 33 L39.5 48 L24.5 48 L27 33 L28 24.5 L28.5 18 Z"
  />

  <!-- Brazo de la balanza y platos -->
  <g fill="none" stroke="#c5e3d7" stroke-linecap="round" stroke-linejoin="round">
    <path stroke-width="3.5" d="M14 20h36"/>
    <path stroke-width="2.5" d="M18 20v10M46 20v10"/>
    <path stroke-width="2.5" d="M8 34 Q18 46 28 34"/>
    <path stroke-width="2.5" d="M36 34 Q46 46 56 34"/>
  </g>
</svg>
